<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vibalaw — Production Plan</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #0f62fe;
  --on-primary: #ffffff;
  --ink: #161616;
  --ink-muted: #525252;
  --ink-subtle: #8c8c8c;
  --canvas: #ffffff;
  --surface-1: #f4f4f4;
  --surface-2: #e0e0e0;
  --hairline: #e0e0e0;
  --inverse-canvas: #161616;
  --inverse-ink: #ffffff;
  --inverse-ink-muted: #c6c6c6;
  --success: #24a148;
  --warning: #f1c21b;
  --error: #da1e28;
  --stl-color: #0f62fe;
  --gldt-color: #8a3ffc;
  --lskc-color: #005d5d;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'IBM Plex Sans', 'Helvetica Neue', Arial, sans-serif;
  font-size: 14px;
  font-weight: 400;
  line-height: 1.29;
  letter-spacing: 0.16px;
  color: var(--ink);
  background: var(--canvas);
}

/* Top Nav */
.top-nav {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--canvas);
  border-bottom: 1px solid var(--hairline);
  height: 48px;
  display: flex;
  align-items: center;
  padding: 0 32px;
  gap: 24px;
}
.top-nav .brand {
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.16px;
  color: var(--ink);
}
.top-nav .nav-stats {
  margin-left: auto;
  display: flex;
  gap: 16px;
  font-size: 12px;
  color: var(--ink-muted);
  letter-spacing: 0.32px;
}
.top-nav .nav-stats strong { color: var(--ink); font-weight: 600; }

/* Hero */
.hero {
  padding: 48px 32px 32px;
  max-width: 1312px;
  margin: 0 auto;
}
.hero h1 {
  font-size: 42px;
  font-weight: 300;
  line-height: 1.20;
  letter-spacing: 0;
  color: var(--ink);
  margin-bottom: 8px;
}
.hero .subtitle {
  font-size: 18px;
  font-weight: 400;
  line-height: 1.50;
  color: var(--ink-muted);
}

/* Dashboard */
.dashboard {
  padding: 0 32px 32px;
  max-width: 1312px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0;
  background: var(--canvas);
}
.stat-card {
  background: var(--canvas);
  padding: 24px;
  border: 1px solid var(--hairline);
}
.stat-card .label {
  font-size: 12px;
  font-weight: 400;
  letter-spacing: 0.32px;
  color: var(--ink-muted);
  text-transform: uppercase;
  margin-bottom: 8px;
}
.stat-card .value {
  font-size: 42px;
  font-weight: 300;
  line-height: 1.20;
  color: var(--ink);
}
.stat-card .value .unit {
  font-size: 14px;
  font-weight: 400;
  color: var(--ink-subtle);
  margin-left: 4px;
}
.stat-card .sub {
  font-size: 12px;
  color: var(--ink-subtle);
  margin-top: 4px;
}

/* Progress bars */
.progress-section {
  padding: 32px 32px 16px;
  max-width: 1312px;
  margin: 0 auto;
}
.progress-row {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 12px;
}
.progress-label {
  width: 80px;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.16px;
}
.progress-label.stl { color: var(--stl-color); }
.progress-label.gldt { color: var(--gldt-color); }
.progress-label.lskc { color: var(--lskc-color); }
.progress-bar {
  flex: 1;
  height: 8px;
  background: var(--surface-1);
  position: relative;
}
.progress-fill {
  height: 100%;
  transition: width 0.3s;
}
.progress-fill.stl { background: var(--stl-color); }
.progress-fill.gldt { background: var(--gldt-color); }
.progress-fill.lskc { background: var(--lskc-color); }
.progress-count {
  width: 60px;
  font-size: 12px;
  color: var(--ink-muted);
  text-align: right;
  letter-spacing: 0.32px;
}

/* Filters */
.filter-bar {
  padding: 0 32px;
  max-width: 1312px;
  margin: 0 auto 16px;
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--hairline);
}
.filter-tab {
  padding: 12px 20px;
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 14px;
  font-weight: 400;
  letter-spacing: 0.16px;
  color: var(--ink-muted);
  background: none;
  border: none;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
}
.filter-tab:hover { color: var(--ink); }
.filter-tab.active {
  color: var(--ink);
  font-weight: 600;
  border-bottom-color: var(--primary);
}

/* Week sections */
.weeks-container {
  padding: 0 32px 64px;
  max-width: 1312px;
  margin: 0 auto;
}
.week-section {
  margin-bottom: 2px;
}
.week-header {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 12px 16px;
  background: var(--surface-1);
  cursor: pointer;
  user-select: none;
}
.week-header:hover { background: var(--surface-2); }
.week-title {
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.16px;
}
.week-dates {
  font-size: 12px;
  color: var(--ink-muted);
  letter-spacing: 0.32px;
}
.week-progress {
  margin-left: auto;
  font-size: 12px;
  color: var(--ink-muted);
  letter-spacing: 0.32px;
}
.week-progress .done { color: var(--success); font-weight: 600; }
.week-chevron {
  font-size: 12px;
  color: var(--ink-subtle);
  transition: transform 0.2s;
}
.week-section.collapsed .week-chevron { transform: rotate(-90deg); }
.week-section.collapsed .week-body { display: none; }

.week-body {
  border: 1px solid var(--hairline);
  border-top: none;
}

/* Episode rows */
.episode-row {
  display: grid;
  grid-template-columns: 40px 60px 1fr 100px;
  align-items: center;
  padding: 10px 16px;
  border-bottom: 1px solid var(--hairline);
  font-size: 14px;
  transition: background 0.1s;
}
.episode-row:last-child { border-bottom: none; }
.episode-row:hover { background: var(--surface-1); }
.episode-row.completed { opacity: 0.5; }

.ep-day {
  font-size: 12px;
  font-weight: 600;
  color: var(--ink-muted);
  letter-spacing: 0.32px;
}
.ep-channel {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.16px;
  padding: 2px 8px;
  display: inline-block;
}
.ep-channel.stl { color: var(--stl-color); background: #edf5ff; }
.ep-channel.gldt { color: var(--gldt-color); background: #f6f2ff; }
.ep-channel.lskc { color: var(--lskc-color); background: #d9fbfb; }

.ep-title {
  font-size: 14px;
  font-weight: 400;
  color: var(--ink);
  letter-spacing: 0.16px;
  padding-right: 16px;
}
.ep-category {
  font-size: 12px;
  color: var(--ink-subtle);
  letter-spacing: 0.32px;
}

/* Checkboxes */
.ep-check {
  display: flex;
  align-items: center;
  justify-content: center;
}
.ep-check input[type="checkbox"] {
  appearance: none;
  width: 16px;
  height: 16px;
  border: 1px solid var(--ink-muted);
  background: var(--canvas);
  cursor: pointer;
  position: relative;
}
.ep-check input[type="checkbox"]:checked {
  background: var(--primary);
  border-color: var(--primary);
}
.ep-check input[type="checkbox"]:checked::after {
  content: '✓';
  color: white;
  font-size: 11px;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}
.ep-check label {
  font-size: 11px;
  color: var(--ink-subtle);
  letter-spacing: 0.32px;
  margin-left: 4px;
}

/* Column headers */
.col-headers {
  display: grid;
  grid-template-columns: 40px 60px 1fr 100px;
  padding: 8px 16px;
  font-size: 11px;
  font-weight: 600;
  color: var(--ink-muted);
  letter-spacing: 0.32px;
  text-transform: uppercase;
  border-bottom: 2px solid var(--ink);
}

/* Footer */
.page-footer {
  background: var(--inverse-canvas);
  padding: 48px 32px;
  color: var(--inverse-ink-muted);
  font-size: 12px;
  letter-spacing: 0.32px;
  text-align: center;
}

/* Responsive */
@media (max-width: 1056px) {
  .dashboard { grid-template-columns: repeat(2, 1fr); }
  .episode-row { grid-template-columns: 36px 50px 1fr 80px; font-size: 13px; }
  .col-headers { grid-template-columns: 36px 50px 1fr 80px; }
}
@media (max-width: 672px) {
  .dashboard { grid-template-columns: 1fr; }
  .hero h1 { font-size: 32px; }
  .episode-row { grid-template-columns: 36px 44px 1fr 60px; font-size: 12px; padding: 8px 8px; }
  .col-headers { grid-template-columns: 36px 44px 1fr 60px; padding: 8px 8px; }
  .top-nav, .hero, .progress-section, .filter-bar, .weeks-container { padding-left: 16px; padding-right: 16px; }
}
</style>

// ============================================================
// STATE — localStorage persistence
// ============================================================
const STORAGE_KEY = 'vibalaw_plan_v2';

function loadState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch { return {}; }
}
function saveState(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
function getKey(i, type) { return `${i}_${type}`; }

// ============================================================
// DATE UTILS
// ============================================================
const START_DATE = new Date(2026, 6, 21); // 2026-07-21 Monday
const DAY_MAP = { 'T2':0, 'T3':1, 'T4':2, 'T5':3, 'T6':4, 'T7':5, 'CN':6 };

function getWeekStart(weekNum) {
  const d = new Date(START_DATE);
  d.setDate(d.getDate() + (weekNum - 1) * 7);
  return d;
}
function getWeekEnd(weekNum) {
  const d = getWeekStart(weekNum);
  d.setDate(d.getDate() + 6);
  return d;
}
function formatDate(d) {
  return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`;
}
function getEpDate(ep) {
  const d = new Date(getWeekStart(ep.week));
  d.setDate(d.getDate() + DAY_MAP[ep.day]);
  return d;
}

// ============================================================
// RENDER
// ============================================================
let currentFilter = 'all';
let state = loadState();

function render() {
  renderDashboard();
  renderWeeks();
}

function renderDashboard() {
  const total = EPISODES.length;

  const stlCount = EPISODES.filter(e=>e.ch==='stl').length;
  const gldtCount = EPISODES.filter(e=>e.ch==='gldt').length;
  const lskcCount = EPISODES.filter(e=>e.ch==='lskc').length;
  const totalWeeksN = Math.max(...EPISODES.map(e => e.week));

  document.getElementById('dashboard').innerHTML = `
    <div class="stat-card">
      <div class="label">Tổng bài</div>
      <div class="value">${total}</div>
      <div class="sub">${totalWeeksN} tuần · 7 bài/tuần</div>
    </div>
    <div class="stat-card">
      <div class="label">STL — Sổ Tay Luật</div>
      <div class="value" style="color:var(--stl-color)">${stlCount}</div>
      <div class="sub">3 bài/tuần · T2, T4, T7</div>
    </div>
    <div class="stat-card">
      <div class="label">GLDT — Góc Luật Đời Thường</div>
      <div class="value" style="color:var(--gldt-color)">${gldtCount}</div>
      <div class="sub">3 bài/tuần · T3, T5, CN</div>
    </div>
    <div class="stat-card">
      <div class="label">LSKC — Luật Sư Kể Chuyện</div>
      <div class="value" style="color:var(--lskc-color)">${lskcCount}</div>
      <div class="sub">1 bài/tuần · T6</div>
    </div>
  `;
}


function renderWeeks() {
  const container = document.getElementById('weeks-container');
  // Keep col-headers
  const headers = container.querySelector('.col-headers');
  container.innerHTML = '';
  container.appendChild(headers);

  const totalWeeks = Math.max(...EPISODES.map(e => e.week));

  for (let w = 1; w <= totalWeeks; w++) {
    const weekEps = EPISODES.map((e,i) => ({...e, idx:i})).filter(e => e.week === w);
    const filtered = currentFilter === 'all' ? weekEps : weekEps.filter(e => e.ch === currentFilter);
    if (filtered.length === 0) continue;

    const ws = getWeekStart(w);
    const we = getWeekEnd(w);

    const section = document.createElement('div');
    section.className = 'week-section';

    section.innerHTML = `
      <div class="week-header" onclick="this.parentElement.classList.toggle('collapsed')">
        <span class="week-title">Tuần ${w}</span>
        <span class="week-dates">${formatDate(ws)} — ${formatDate(we)}</span>
        <span class="week-dates" style="font-style:italic">SX trước: ${formatDate(new Date(ws.getTime() - 86400000))}</span>
        <span class="week-progress">${filtered.filter(e=>e.done).length}/${filtered.length} bài</span>
        <span class="week-chevron">▼</span>
      </div>
      <div class="week-body">
        ${filtered.map(ep => {
          const epDate = getEpDate(ep);
          return `
          <div class="episode-row${ep.done?' completed':''}">
            <span class="ep-day">${ep.day}</span>
            <span class="ep-channel ${ep.ch}">${ep.ch.toUpperCase()}</span>
            <span class="ep-title">${ep.done?'✅ ':''}${ep.title}</span>
            <span class="ep-category">${ep.cat}</span>
          </div>`;
        }).join('')}
      </div>
    `;
    container.appendChild(section);
  }
}

function toggle(idx, type, checked) {
  state[getKey(idx, type)] = checked;
  saveState(state);
  render();
}

// Filter tabs
document.querySelectorAll('.filter-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentFilter = tab.dataset.filter;
    render();
  });
});

// Initial render
render();
</script>
